name: OWASP ZAP DAST Scan
on: [push]

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and Run App
        run: |
          npm install
          node index.js &
          # Aumentamos o sleep para garantir que o express subiu na porta 3000
          sleep 20 

      - name: ZAP Scan (Modo Monitoramento)
        run: |
          # Rodamos o ZAP via Docker diretamente
          # O "|| true" garante que o pipeline finalize como SUCESSO (Verde)
          # mesmo que ele encontre alertas de segurança (WARN-NEW)
          docker run --network=host -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py -t http://localhost:3000 || true
